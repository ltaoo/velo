<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设置</title>
  <script src="/public/input-policy.js" defer></script>
  <style>
    :root {
      color-scheme: light;
      --background: #ededed;
      --BG-0: #ffffff;
      --BG-1: #f7f7f7;
      --BG-2: #ffffff;
      --BG-3: #f0f2f1;
      --FG-0: rgba(0, 0, 0, 0.9);
      --FG-1: rgba(0, 0, 0, 0.58);
      --FG-2: rgba(0, 0, 0, 0.34);
      --border: #dedede;
      --accent: #0f9f6e;
      --accent-strong: #08784f;
      --accent-soft: rgba(15, 159, 110, 0.12);
      --danger: #c93a32;
      --danger-soft: rgba(201, 58, 50, 0.1);
      --font-root: 14px;
      --font-xs: 0.8571rem;
      --font-sm: 0.9286rem;
      --font-md: 1rem;
      --font-body: 1rem;
      --font-2xl: 1.2857rem;
      --font-3xl: 1.4286rem;
      --font-title: 1.5714rem;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --background: #111111;
      --BG-0: #151515;
      --BG-1: #1d1d1d;
      --BG-2: #191919;
      --BG-3: #242424;
      --FG-0: rgba(255, 255, 255, 0.86);
      --FG-1: rgba(255, 255, 255, 0.56);
      --FG-2: rgba(255, 255, 255, 0.34);
      --border: rgba(255, 255, 255, 0.11);
      --accent: #20b883;
      --accent-strong: #7ee0bd;
      --accent-soft: rgba(32, 184, 131, 0.15);
      --danger: #ff746c;
      --danger-soft: rgba(255, 116, 108, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overscroll-behavior: none;
    }

    html {
      font-size: var(--font-root);
    }

    body {
      background: var(--background);
      color: var(--FG-0);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: var(--font-body);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .settings-shell {
      background: var(--BG-0);
      display: grid;
      grid-template-columns: 176px minmax(0, 1fr);
      height: 100%;
      overflow: hidden;
    }

    .settings-sidebar {
      background: var(--BG-1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 18px 14px;
    }

    .settings-brand {
      margin-bottom: 18px;
    }

    .settings-title {
      font-size: var(--font-2xl);
      font-weight: 700;
      line-height: 1.2;
    }

    .settings-subtitle {
      color: var(--FG-1);
      font-size: var(--font-sm);
      margin-top: 4px;
    }

    .settings-nav {
      display: grid;
      gap: 6px;
    }

    .settings-nav-button {
      align-items: center;
      background: transparent;
      border: 0;
      border-radius: 6px;
      color: var(--FG-1);
      display: inline-flex;
      gap: 8px;
      height: 36px;
      justify-content: flex-start;
      padding: 0 10px;
      text-align: left;
      width: 100%;
    }

    .settings-nav-button.is-active,
    .settings-nav-button:hover {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .settings-nav-button svg,
    .settings-section-icon svg,
    .setting-status svg {
      display: inline-block;
      fill: none;
      height: 16px;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
      width: 16px;
    }

    .settings-main {
      min-height: 0;
      min-width: 0;
      overflow: auto;
      padding: 24px;
    }

    .settings-header {
      align-items: flex-start;
      display: flex;
      gap: 14px;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .settings-header h1 {
      font-size: var(--font-title);
      line-height: 1.2;
      margin: 0;
    }

    .settings-header p {
      color: var(--FG-1);
      font-size: var(--font-md);
      margin: 5px 0 0;
    }

    .setting-status {
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--FG-1);
      display: inline-flex;
      flex: 0 0 auto;
      gap: 6px;
      min-height: 30px;
      padding: 0 10px;
      white-space: nowrap;
    }

    .setting-status.is-ready {
      background: var(--accent-soft);
      border-color: transparent;
      color: var(--accent-strong);
    }

    .setting-status.is-warning {
      background: var(--danger-soft);
      border-color: transparent;
      color: var(--danger);
    }

    .settings-form {
      display: grid;
      gap: 14px;
      max-width: 960px;
    }

    .settings-panel[hidden] {
      display: none;
    }

    .settings-section {
      border-top: 1px solid var(--border);
      display: grid;
      gap: 12px;
      padding-top: 16px;
    }

    .settings-section:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .settings-profile-head {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }

    .settings-profile-title {
      color: var(--FG-1);
      font-size: var(--font-sm);
      font-weight: 700;
    }

    .settings-storage-list {
      display: grid;
      gap: 8px;
    }

    .settings-storage-row {
      align-items: stretch;
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .settings-storage-item {
      align-items: center;
      background: var(--BG-1);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--FG-0);
      display: grid;
      gap: 4px;
      grid-template-columns: minmax(0, 1fr) auto;
      min-height: 48px;
      padding: 8px 10px;
      text-align: left;
      width: 100%;
    }

    .settings-storage-manage {
      align-items: center;
      background: var(--BG-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--FG-0);
      display: inline-flex;
      justify-content: center;
      min-height: 48px;
      padding: 0 12px;
      white-space: nowrap;
    }

    .settings-storage-manage:hover {
      border-color: var(--accent);
      color: var(--accent-strong);
    }

    .settings-storage-actions {
      display: inline-grid;
      gap: 8px;
      grid-auto-flow: column;
    }

    .settings-storage-item.is-selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }

    .settings-storage-item-main {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .settings-storage-item-name {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .settings-storage-item-meta {
      color: var(--FG-1);
      font-size: var(--font-sm);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .settings-storage-badge {
      background: var(--accent-soft);
      border-radius: 999px;
      color: var(--accent-strong);
      font-size: var(--font-sm);
      font-weight: 700;
      padding: 3px 8px;
      white-space: nowrap;
    }

    .settings-section-head {
      align-items: center;
      display: flex;
      gap: 8px;
    }

    .settings-section-title {
      font-size: var(--font-body);
      font-weight: 700;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .settings-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .settings-field.is-wide {
      grid-column: 1 / -1;
    }

    .settings-label-row {
      align-items: center;
      color: var(--FG-1);
      display: flex;
      font-size: var(--font-sm);
      font-weight: 700;
      justify-content: space-between;
      min-height: 18px;
    }

    .settings-required {
      color: var(--accent-strong);
      font-weight: 700;
    }

    .settings-input,
    .settings-select,
    .settings-textarea {
      background: var(--BG-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--FG-0);
      min-height: 36px;
      outline: 0;
      padding: 0 10px;
      width: 100%;
    }

    .settings-textarea {
      line-height: 1.5;
      min-height: 72px;
      padding: 9px 10px;
      resize: vertical;
    }

    .settings-input:focus,
    .settings-select:focus,
    .settings-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .settings-secret {
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .settings-checks {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .settings-check {
      align-items: center;
      background: var(--BG-1);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--FG-0);
      display: flex;
      gap: 8px;
      min-height: 38px;
      padding: 0 10px;
    }

    .settings-check input {
      accent-color: var(--accent);
      height: 15px;
      width: 15px;
    }

    .settings-actions {
      align-items: center;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 2px;
      padding-top: 16px;
    }

    .settings-button {
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: inline-flex;
      gap: 8px;
      justify-content: center;
      min-height: 34px;
      padding: 0 12px;
      white-space: nowrap;
    }

    .settings-button.is-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .settings-button.is-secondary {
      background: var(--BG-2);
      color: var(--FG-0);
    }

    .settings-button.is-danger {
      background: transparent;
      color: var(--danger);
      margin-right: auto;
    }

    .settings-button:hover {
      filter: brightness(0.98);
    }

    .settings-button:disabled {
      cursor: default;
      opacity: 0.58;
    }

    .settings-message {
      color: var(--FG-1);
      flex: 1 1 220px;
      font-size: var(--font-sm);
      min-width: 0;
    }

    .settings-info-list {
      display: grid;
      gap: 8px;
    }

    .settings-info-row {
      align-items: center;
      background: var(--BG-1);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: grid;
      gap: 12px;
      grid-template-columns: 140px minmax(0, 1fr);
      min-height: 42px;
      padding: 8px 10px;
    }

    .settings-info-label {
      color: var(--FG-1);
      font-size: var(--font-sm);
      font-weight: 700;
    }

    .settings-info-value {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .settings-update-panel {
      display: grid;
      gap: 10px;
    }

    .settings-update-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .settings-update-progress {
      background: var(--BG-1);
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }

    .settings-update-progress-bar {
      background: var(--accent);
      height: 100%;
      transition: width 0.2s ease;
      width: 0;
    }

    .settings-update-message,
    .settings-update-current {
      color: var(--FG-1);
      font-size: var(--font-sm);
    }

    .settings-update-release {
      display: grid;
      gap: 6px;
    }

    .settings-update-version {
      color: var(--accent-strong);
      font-weight: 700;
    }

    .settings-update-notes {
      background: var(--BG-1);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--FG-0);
      line-height: 1.5;
      max-height: 180px;
      overflow: auto;
      padding: 10px;
      white-space: pre-wrap;
    }

    .settings-shortcut-card {
      align-items: center;
      background: var(--BG-1);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(0, 1fr) auto;
      padding: 14px;
    }

    .settings-shortcut-title {
      font-weight: 700;
      line-height: 1.3;
    }

    .settings-shortcut-description {
      color: var(--FG-1);
      font-size: var(--font-sm);
      line-height: 1.5;
      margin-top: 4px;
    }

    .settings-shortcut-input {
      background: var(--BG-0);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--FG-0);
      font-weight: 700;
      height: 34px;
      min-width: 136px;
      padding: 0 10px;
      text-align: center;
    }

    .settings-shortcut-input:focus {
      border-color: var(--accent);
      outline: 2px solid var(--accent-soft);
    }

    .settings-shortcut-actions {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 620px) {
      .settings-shell {
        grid-template-columns: minmax(0, 1fr);
      }

      .settings-sidebar {
        border-bottom: 1px solid var(--border);
        border-right: 0;
        padding: 14px;
      }

      .settings-brand {
        margin-bottom: 10px;
      }

      .settings-main {
        padding: 18px 14px;
      }

      .settings-header {
        display: grid;
      }

      .settings-grid,
      .settings-checks {
        grid-template-columns: minmax(0, 1fr);
      }

      .settings-profile-head {
        align-items: stretch;
        display: grid;
      }

      .settings-actions {
        justify-content: stretch;
      }

      .settings-storage-row {
        grid-template-columns: minmax(0, 1fr);
      }

      .settings-storage-actions {
        grid-auto-flow: row;
      }

      .settings-button {
        flex: 1 1 auto;
      }

      .settings-info-row {
        grid-template-columns: minmax(0, 1fr);
      }

      .settings-update-actions {
        display: grid;
      }

      .settings-button.is-danger {
        margin-right: 0;
      }

      .settings-shortcut-card {
        grid-template-columns: minmax(0, 1fr);
      }

      .settings-shortcut-input {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <script>
    !function () {
      try {
        var root = document.documentElement;
        var saved = localStorage.getItem("theme");
        if (saved === "system" || !saved) {
          var media = window.matchMedia("(prefers-color-scheme: dark)");
          var theme = media.media !== "(prefers-color-scheme: dark)" || media.matches ? "dark" : "light";
          root.style.colorScheme = theme;
          root.setAttribute("data-theme", theme);
        } else {
          root.style.colorScheme = saved;
          root.setAttribute("data-theme", saved);
        }
      } catch (_) { }
    }();
  </script>

  <div class="settings-shell">
    <aside class="settings-sidebar" aria-label="设置菜单">
      <div class="settings-brand">
        <div class="settings-title">设置</div>
        <div class="settings-subtitle">Demo Desktop</div>
      </div>
      <nav class="settings-nav" aria-label="设置分类">
        <button class="settings-nav-button is-active" type="button" data-panel="cloud-storage">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.5 19H7a5 5 0 1 1 1-9.9 6 6 0 0 1 11.4 2.5A3.8 3.8 0 0 1 17.5 19z"></path></svg>
          <span>云存储</span>
        </button>
        <button class="settings-nav-button" type="button" data-panel="shortcuts">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M7 9h.01"></path><path d="M11 9h.01"></path><path d="M15 9h.01"></path><path d="M7 13h10"></path></svg>
          <span>快捷键</span>
        </button>
        <button class="settings-nav-button" type="button" data-panel="about">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 11v5"></path><path d="M12 8h.01"></path></svg>
          <span>关于</span>
        </button>
      </nav>
    </aside>

    <main class="settings-main">
      <header class="settings-header">
        <div>
          <h1 data-settings-title>云存储</h1>
          <p data-settings-subtitle>S3/OSS 兼容对象存储配置</p>
        </div>
        <div class="setting-status" data-config-status>
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>
          <span data-config-status-text>未配置</span>
        </div>
      </header>

      <div class="settings-form settings-panel" data-settings-panel="cloud-storage">
        <section class="settings-section">
          <div class="settings-profile-head">
            <div class="settings-profile-title">存储配置</div>
            <span>
              <button class="settings-button is-secondary" type="button" data-action="add-storage">新增远端</button>
              <button class="settings-button is-secondary" type="button" data-action="add-local-storage">新增本地</button>
            </span>
          </div>
          <div class="settings-storage-list" data-storage-list></div>
        </section>

        <div class="settings-actions">
          <div class="settings-message" data-settings-message></div>
        </div>
      </div>

      <div class="settings-form settings-panel" data-settings-panel="shortcuts" hidden>
        <section class="settings-section">
          <div class="settings-profile-head">
            <div class="settings-profile-title">Memo 搜索</div>
          </div>
          <div class="settings-shortcut-card">
            <div>
              <div class="settings-shortcut-title">搜索并分离打开 memo</div>
              <div class="settings-shortcut-description">按快捷键打开 memo 搜索，回车或点击结果后使用分离窗口打开。</div>
            </div>
            <input class="settings-shortcut-input" data-shortcut-input="openMemoSearch" readonly aria-label="搜索 memo 快捷键" />
          </div>
          <div class="settings-shortcut-actions">
            <label class="settings-check">
              <input type="checkbox" data-shortcut-enabled="openMemoSearch" />
              <span>启用快捷键</span>
            </label>
            <button class="settings-button is-secondary" type="button" data-action="reset-shortcut">恢复默认</button>
          </div>
        </section>

        <div class="settings-actions">
          <div class="settings-message" data-shortcut-message></div>
        </div>
      </div>

      <div class="settings-form settings-panel" data-settings-panel="about" hidden>
        <section class="settings-section">
          <div class="settings-profile-head">
            <div class="settings-profile-title">应用信息</div>
          </div>
          <div class="settings-info-list">
            <div class="settings-info-row">
              <div class="settings-info-label">应用版本</div>
              <div class="settings-info-value" data-app-version>读取中</div>
            </div>
            <div class="settings-info-row">
              <div class="settings-info-label">Velo 版本</div>
              <div class="settings-info-value" data-velo-version>读取中</div>
            </div>
            <div class="settings-info-row">
              <div class="settings-info-label">运行模式</div>
              <div class="settings-info-value" data-app-mode>读取中</div>
            </div>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-profile-head">
            <div class="settings-profile-title">更新</div>
          </div>
          <div class="settings-update-panel">
            <div class="settings-update-actions" data-update-actions></div>
            <div class="settings-update-progress" data-update-progress hidden>
              <div class="settings-update-progress-bar" data-update-progress-bar></div>
            </div>
            <div class="settings-update-message" data-update-message>可手动检查新版本</div>
            <div class="settings-update-release" data-update-release></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = "demo-desktop:settings:cloud-storage:v1";
      var SHORTCUTS_KEY = "demo-desktop:settings:shortcuts:v1";
      var STORAGE_API = "/api/settings/cloud-storage";
      var STORAGE_SAVE_API = "/api/settings/cloud-storage/save";
      var OPEN_WINDOW_API = "/api/open_window";
      var activePanel = initialPanel();
      var navButtons = Array.prototype.slice.call(document.querySelectorAll(".settings-nav-button[data-panel]"));
      var panels = Array.prototype.slice.call(document.querySelectorAll("[data-settings-panel]"));
      var headerTitle = document.querySelector("[data-settings-title]");
      var headerSubtitle = document.querySelector("[data-settings-subtitle]");
      var storagePanel = document.querySelector('[data-settings-panel="cloud-storage"]');
      var shortcutsPanel = document.querySelector('[data-settings-panel="shortcuts"]');
      var aboutPanel = document.querySelector('[data-settings-panel="about"]');
      var message = document.querySelector("[data-settings-message]");
      var shortcutInput = document.querySelector('[data-shortcut-input="openMemoSearch"]');
      var shortcutEnabled = document.querySelector('[data-shortcut-enabled="openMemoSearch"]');
      var shortcutMessage = document.querySelector("[data-shortcut-message]");
      var status = document.querySelector("[data-config-status]");
      var statusText = document.querySelector("[data-config-status-text]");
      var storageList = document.querySelector("[data-storage-list]");
      var appVersion = document.querySelector("[data-app-version]");
      var veloVersion = document.querySelector("[data-velo-version]");
      var appMode = document.querySelector("[data-app-mode]");
      var updateActions = document.querySelector("[data-update-actions]");
      var updateMessage = document.querySelector("[data-update-message]");
      var updateProgress = document.querySelector("[data-update-progress]");
      var updateProgressBar = document.querySelector("[data-update-progress-bar]");
      var updateRelease = document.querySelector("[data-update-release]");
      var appInfo = null;
      var updateState = {
        info: null,
        message: "",
        progress: 0,
        status: "idle",
      };
      var state = normalizeSettings(null);
      var shortcuts = loadShortcutSettings();

      render();
      loadAppInfo();
      bindUpdateMessages();
      loadConfig().then(function (settings) {
        state = normalizeSettings(settings);
        render();
      }, function (err) {
        setMessage("读取配置失败: " + errorMessage(err), "warning");
      });

      document.querySelector(".settings-nav").addEventListener("click", function (event) {
        var button = event.target.closest("[data-panel]");
        if (!button) return;
        setActivePanel(button.dataset.panel || "cloud-storage");
      });

      storagePanel.addEventListener("click", function (event) {
        var action = event.target.closest("[data-action]");
        if (!action) return;

        if (action.dataset.action === "manage-storage") {
          openStorageManager(action.dataset.storageId || "");
          return;
        }

        if (action.dataset.action === "edit-storage") {
          openStorageEditor(action.dataset.storageId || "", "");
          return;
        }

        if (action.dataset.action === "add-storage") {
          openStorageEditor("", "s3");
          return;
        }

        if (action.dataset.action === "add-local-storage") {
          openStorageEditor("", "local");
          return;
        }

        if (action.dataset.action === "activate-storage") {
          activateStorage(action.dataset.storageId || "");
          return;
        }
      });

      shortcutsPanel.addEventListener("click", function (event) {
        var action = event.target.closest("[data-action]");
        if (!action) return;
        if (action.dataset.action === "reset-shortcut") {
          shortcuts = defaultShortcutSettings();
          saveShortcutSettings(shortcuts);
          renderShortcuts();
          setShortcutMessage("已恢复默认快捷键", "ready");
        }
      });

      shortcutsPanel.addEventListener("change", function (event) {
        if (!event.target.matches("[data-shortcut-enabled]")) return;
        shortcuts.enabled = Boolean(event.target.checked);
        saveShortcutSettings(shortcuts);
        renderShortcuts();
        setShortcutMessage(shortcuts.enabled ? "已启用快捷键" : "已停用快捷键", shortcuts.enabled ? "ready" : "");
      });

      shortcutInput.addEventListener("keydown", function (event) {
        event.preventDefault();
        event.stopPropagation();
        var shortcut = shortcutFromEvent(event);
        if (!shortcut) return;
        shortcuts.openMemoSearch = shortcut;
        shortcuts.enabled = true;
        saveShortcutSettings(shortcuts);
        renderShortcuts();
        setShortcutMessage("已保存 " + shortcut, "ready");
      });

      aboutPanel.addEventListener("click", function (event) {
        var action = event.target.closest("[data-action]");
        if (!action) return;

        if (action.dataset.action === "check-update") {
          checkUpdate();
          return;
        }

        if (action.dataset.action === "download-update") {
          downloadUpdate();
          return;
        }

        if (action.dataset.action === "apply-update") {
          applyUpdate();
        }
      });

      window.addEventListener("focus", function () {
        loadConfig().then(function (settings) {
          state = normalizeSettings(settings);
          render();
        }, function (_) { });
        loadAppInfo();
      });

      function activateStorage(storageId) {
        var id = sanitizeStorageId(storageId);
        if (!id || id === state.activeStorageId) return;
        var exists = state.storages.some(function (storage) {
          return storage.id === id;
        });
        if (!exists) return;
        state.activeStorageId = id;
        state.storages = state.storages.map(function (storage) {
          return Object.assign({}, storage, {
            enabled: storage.id === id,
          });
        });
        render();
        setMessage("正在切换启用存储...", "");
        saveConfig(state).then(function (saved) {
          state = normalizeSettings(saved || state);
          render();
          setMessage("已启用 " + (activeStorage(state) || {}).name, "ready");
        }, function (err) {
          setMessage("启用失败: " + errorMessage(err), "warning");
          return loadConfig().then(function (settings) {
            state = normalizeSettings(settings);
            render();
          });
        });
      }

      function loadConfig() {
        if (canUseNativeStorage()) {
          return callStorage(STORAGE_API, "GET").then(function (data) {
            if (data && data.found && data.config) {
              return normalizeSettings(data.config);
            }
            return normalizeSettings(loadLocalConfig());
          }, function () {
            return loadLocalConfig();
          });
        }
        return Promise.resolve(loadLocalConfig());
      }

      function loadLocalConfig() {
        try {
          var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          return normalizeSettings(saved);
        } catch (_) {
          return normalizeSettings(null);
        }
      }

      function saveConfig(settings) {
        var next = normalizeSettings(settings);
        if (canUseNativeStorage()) {
          return callStorage(STORAGE_SAVE_API, "POST", next).then(function (data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
            return data && data.config ? data.config : next;
          });
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
        return Promise.resolve(next);
      }

      function callStorage(url, method, args) {
        return invoke(url, { method: method, args: args }).then(function (resp) {
          if (!resp || resp.code !== 0) {
            throw new Error((resp && resp.msg) || "storage request failed");
          }
          return resp.data;
        });
      }

      function canUseNativeStorage() {
        return typeof invoke === "function";
      }

      function loadAppInfo() {
        if (!canUseNativeStorage()) {
          appInfo = {
            mode: "browser",
            velo: "不可用",
            version: "不可用",
          };
          renderAbout();
          return;
        }
        callStorage("/api/app", "GET").then(function (data) {
          appInfo = data || {};
          renderAbout();
        }, function () {
          appInfo = {
            mode: "读取失败",
            velo: "读取失败",
            version: "读取失败",
          };
          renderAbout();
        });
      }

      function bindUpdateMessages() {
        if (!window.onGoMessage) return;
        window.onGoMessage(function (payload) {
          if (!payload || payload.type !== "download_progress") return;
          updateState.progress = Math.round(payload.percentage || 0);
          var speed = payload.speed || 0;
          var speedText = speed > 1048576
            ? (speed / 1048576).toFixed(1) + " MB/s"
            : (speed / 1024).toFixed(0) + " KB/s";
          updateState.message = "正在下载更新... " + updateState.progress + "% (" + speedText + ")";
          renderUpdate();
        });
      }

      function checkUpdate() {
        if (!canUseNativeStorage()) {
          updateState.status = "idle";
          updateState.message = "当前环境不支持检查更新";
          renderUpdate();
          return;
        }
        updateState.status = "checking";
        updateState.message = "正在检查更新...";
        updateState.info = null;
        updateState.progress = 0;
        renderUpdate();

        callStorage("/api/update/check", "GET").then(function (data) {
          if (data && data.hasUpdate) {
            updateState.status = "checked";
            updateState.info = data;
            updateState.message = "发现新版本: " + data.version;
          } else {
            updateState.status = "idle";
            updateState.message = "当前已是最新版本 (" + ((data && data.currentVersion) || "未知") + ")";
          }
          renderUpdate();
        }, function (err) {
          updateState.status = "idle";
          updateState.message = "检查失败: " + errorMessage(err);
          renderUpdate();
        });
      }

      function downloadUpdate() {
        if (!canUseNativeStorage()) {
          updateState.status = "checked";
          updateState.message = "当前环境不支持下载更新";
          renderUpdate();
          return;
        }
        updateState.status = "downloading";
        updateState.progress = 0;
        updateState.message = "正在下载更新... 0%";
        renderUpdate();

        callStorage("/api/update/download", "GET").then(function (data) {
          if (data && data.success) {
            updateState.progress = 100;
            updateState.status = "downloaded";
            updateState.message = "下载完成，可以应用更新";
          } else {
            updateState.status = "checked";
            updateState.message = "下载失败: " + ((data && data.error) || "未知错误");
          }
          renderUpdate();
        }, function (err) {
          updateState.status = "checked";
          updateState.message = "下载失败: " + errorMessage(err);
          renderUpdate();
        });
      }

      function applyUpdate() {
        if (!canUseNativeStorage()) {
          updateState.status = "downloaded";
          updateState.message = "当前环境不支持应用更新";
          renderUpdate();
          return;
        }
        updateState.status = "applying";
        updateState.message = "正在应用更新并重启...";
        renderUpdate();

        callStorage("/api/update/restart", "GET").then(function (data) {
          if (!data || !data.success) {
            updateState.status = "downloaded";
            updateState.message = "应用失败: " + ((data && data.error) || "未知错误");
            renderUpdate();
          }
        }, function (err) {
          updateState.status = "downloaded";
          updateState.message = "应用失败: " + errorMessage(err);
          renderUpdate();
        });
      }

      function render() {
        renderShell();
        renderStorageList();
        renderShortcuts();
        renderStatus(state);
        renderAbout();
      }

      function setActivePanel(panelName) {
        activePanel = panelName === "about" || panelName === "shortcuts" ? panelName : "cloud-storage";
        render();
        replacePanelQuery();
      }

      function renderShell() {
        var isAbout = activePanel === "about";
        var isShortcuts = activePanel === "shortcuts";
        navButtons.forEach(function (button) {
          button.classList.toggle("is-active", button.dataset.panel === activePanel);
        });
        panels.forEach(function (panel) {
          panel.hidden = panel.dataset.settingsPanel !== activePanel;
        });
        headerTitle.textContent = isAbout ? "关于" : isShortcuts ? "快捷键" : "云存储";
        headerSubtitle.textContent = isAbout ? "版本信息与应用更新" : isShortcuts ? "键盘操作与快速入口" : "S3/OSS 兼容对象存储配置";
        status.hidden = isAbout || isShortcuts;
      }

      function renderAbout() {
        appVersion.textContent = appInfo && appInfo.version ? appInfo.version : "读取中";
        veloVersion.textContent = appInfo && appInfo.velo ? appInfo.velo : "读取中";
        appMode.textContent = appInfo && appInfo.mode ? appInfo.mode : "读取中";
        renderUpdate();
      }

      function renderUpdate() {
        updateActions.innerHTML = updateActionsTemplate(updateState.status);
        updateMessage.textContent = updateState.message || "可手动检查新版本";
        updateProgress.hidden = updateState.status !== "downloading" && updateState.progress <= 0;
        updateProgressBar.style.width = updateState.progress + "%";
        updateRelease.innerHTML = updateState.info ? updateReleaseTemplate(updateState.info) : "";
      }

      function updateActionsTemplate(updateStatus) {
        if (updateStatus === "checking") {
          return '<button class="settings-button is-secondary" type="button" disabled>检查中...</button>';
        }
        if (updateStatus === "checked") {
          return [
            '<button class="settings-button is-secondary" type="button" data-action="check-update">重新检查</button>',
            '<button class="settings-button is-primary" type="button" data-action="download-update">下载更新</button>',
          ].join("");
        }
        if (updateStatus === "downloading") {
          return '<button class="settings-button is-secondary" type="button" disabled>下载中...</button>';
        }
        if (updateStatus === "downloaded") {
          return [
            '<button class="settings-button is-secondary" type="button" data-action="check-update">重新检查</button>',
            '<button class="settings-button is-primary" type="button" data-action="apply-update">应用更新并重启</button>',
          ].join("");
        }
        if (updateStatus === "applying") {
          return '<button class="settings-button is-secondary" type="button" disabled>应用中...</button>';
        }
        return '<button class="settings-button is-secondary" type="button" data-action="check-update">检查更新</button>';
      }

      function updateReleaseTemplate(info) {
        return [
          '<div class="settings-update-version">新版本 ' + escapeHTML(info.version || "") + '</div>',
          '<div class="settings-update-current">当前版本 ' + escapeHTML(info.currentVersion || "") + '</div>',
          '<div class="settings-update-notes">' + escapeHTML(info.releaseNotes || "暂无更新说明") + '</div>',
        ].join("");
      }

      function initialPanel() {
        try {
          var params = new URLSearchParams(window.location.search || "");
          if (params.get("panel") === "shortcuts") return "shortcuts";
          return params.get("panel") === "about" ? "about" : "cloud-storage";
        } catch (_) {
          return "cloud-storage";
        }
      }

      function replacePanelQuery() {
        try {
          var url = new URL(window.location.href);
          if (activePanel === "about" || activePanel === "shortcuts") {
            url.searchParams.set("panel", activePanel);
          } else {
            url.searchParams.delete("panel");
          }
          window.history.replaceState(null, "", url.pathname + url.search + url.hash);
        } catch (_) { }
      }

      function renderShortcuts() {
        shortcuts = normalizeShortcutSettings(shortcuts);
        if (shortcutInput) shortcutInput.value = shortcuts.openMemoSearch;
        if (shortcutEnabled) shortcutEnabled.checked = shortcuts.enabled;
      }

      function loadShortcutSettings() {
        try {
          return normalizeShortcutSettings(JSON.parse(localStorage.getItem(SHORTCUTS_KEY) || "null"));
        } catch (_) {
          return defaultShortcutSettings();
        }
      }

      function saveShortcutSettings(value) {
        shortcuts = normalizeShortcutSettings(value);
        localStorage.setItem(SHORTCUTS_KEY, JSON.stringify(shortcuts));
      }

      function defaultShortcutSettings() {
        return {
          enabled: true,
          openMemoSearch: "Ctrl+O",
        };
      }

      function normalizeShortcutSettings(value) {
        var raw = value && typeof value === "object" ? value : {};
        var defaults = defaultShortcutSettings();
        return {
          enabled: raw.enabled !== false,
          openMemoSearch: normalizeShortcut(raw.openMemoSearch) || defaults.openMemoSearch,
        };
      }

      function shortcutFromEvent(event) {
        var key = shortcutKeyName(event.key);
        if (!key) return "";
        var parts = [];
        if (event.ctrlKey) parts.push("Ctrl");
        if (event.altKey) parts.push("Alt");
        if (event.shiftKey) parts.push("Shift");
        if (event.metaKey) parts.push("Meta");
        if (!parts.length && key.length === 1) return "";
        parts.push(key);
        return parts.join("+");
      }

      function normalizeShortcut(value) {
        var raw = String(value || "").trim();
        if (!raw) return "";
        var parts = raw.split("+").map(function (part) {
          return part.trim();
        }).filter(Boolean);
        if (!parts.length) return "";
        var modifiers = [];
        var key = "";
        parts.forEach(function (part) {
          var lower = part.toLowerCase();
          if (lower === "ctrl" || lower === "control") {
            if (modifiers.indexOf("Ctrl") < 0) modifiers.push("Ctrl");
          } else if (lower === "alt" || lower === "option") {
            if (modifiers.indexOf("Alt") < 0) modifiers.push("Alt");
          } else if (lower === "shift") {
            if (modifiers.indexOf("Shift") < 0) modifiers.push("Shift");
          } else if (lower === "meta" || lower === "cmd" || lower === "command") {
            if (modifiers.indexOf("Meta") < 0) modifiers.push("Meta");
          } else {
            key = shortcutKeyName(part);
          }
        });
        if (!key) return "";
        if (!modifiers.length && key.length === 1) return "";
        return modifiers.concat(key).join("+");
      }

      function shortcutKeyName(key) {
        var original = String(key || "");
        if (original === " ") return "Space";
        var value = original.trim();
        if (!value) return "";
        var lower = value.toLowerCase();
        if (lower === "control" || lower === "shift" || lower === "alt" || lower === "meta") return "";
        if (lower === "escape" || lower === "esc") return "Esc";
        if (lower === "arrowup") return "Up";
        if (lower === "arrowdown") return "Down";
        if (lower === "arrowleft") return "Left";
        if (lower === "arrowright") return "Right";
        if (value.length === 1) return value.toUpperCase();
        return value.charAt(0).toUpperCase() + value.slice(1);
      }

      function setShortcutMessage(text, tone) {
        if (!shortcutMessage) return;
        shortcutMessage.textContent = text || "";
        shortcutMessage.style.color = tone === "warning" ? "var(--danger)" : tone === "ready" ? "var(--accent-strong)" : "";
      }

      function renderStorageList() {
        if (!state.storages.length) {
          storageList.innerHTML = '<div class="settings-storage-item"><span class="settings-storage-item-main"><span class="settings-storage-item-name">暂无存储</span><span class="settings-storage-item-meta">点击新增存储开始配置</span></span></div>';
          return;
        }
        storageList.innerHTML = state.storages.map(function (storage) {
          var active = storage.id === state.activeStorageId;
          var meta = [storage.id, providerLabel(storage.provider), storage.bucket].filter(Boolean).join(" · ");
          return [
            '<div class="settings-storage-row">',
            '<button class="settings-storage-item ' + (active ? "is-selected" : "") + '" type="button" data-action="activate-storage" data-storage-id="' + escapeAttr(storage.id) + '">',
            '<span class="settings-storage-item-main">',
            '<span class="settings-storage-item-name">' + escapeHTML(storage.name || storage.id) + '</span>',
            '<span class="settings-storage-item-meta">' + escapeHTML(meta || "未配置") + '</span>',
            '</span>',
            active ? '<span class="settings-storage-badge">启用</span>' : '',
            '</button>',
            '<span class="settings-storage-actions">',
            '<button class="settings-storage-manage" type="button" data-action="edit-storage" data-storage-id="' + escapeAttr(storage.id) + '">编辑</button>',
            '<button class="settings-storage-manage" type="button" data-action="manage-storage" data-storage-id="' + escapeAttr(storage.id) + '">管理</button>',
            '</span>',
            '</div>',
          ].join("");
        }).join("");
      }

      function openStorageManager(storageId) {
        var id = sanitizeStorageId(storageId);
        if (!id) return;
        callStorage(OPEN_WINDOW_API + "?pathname=/oss-manager&storageId=" + encodeURIComponent(id), "GET").then(function () {
          setMessage("已打开文件管理窗口", "ready");
        }, function (err) {
          setMessage("打开文件管理失败: " + errorMessage(err), "warning");
        });
      }

      function openStorageEditor(storageId, provider) {
        var id = sanitizeStorageId(storageId);
        var query = "?pathname=/oss-storage-editor";
        if (id) query += "&storageId=" + encodeURIComponent(id);
        if (provider) query += "&provider=" + encodeURIComponent(provider);
        callStorage(OPEN_WINDOW_API + query, "GET").then(function () {
          setMessage(id ? "已打开编辑窗口" : "已打开新增窗口", "ready");
        }, function (err) {
          setMessage("打开编辑窗口失败: " + errorMessage(err), "warning");
        });
      }

      function renderStatus(settings) {
        var active = activeStorage(settings);
        var missing = active ? missingFields(active) : [];
        status.classList.remove("is-ready", "is-warning");
        if (!active || !hasAnyConfig(active)) {
          statusText.textContent = "未配置";
          return;
        }
        if (missing.length) {
          status.classList.add("is-warning");
          statusText.textContent = "待补充";
          return;
        }
        status.classList.add("is-ready");
        statusText.textContent = active.enabled ? "已启用" : "已保存";
      }

      function missingFields(config) {
        if (!config) {
          return ["名称", "Storage ID", "存储类型", "Endpoint", "Bucket", "Access Key ID", "Secret Access Key"];
        }
        var labels = [];
        if (!config.name) labels.push("名称");
        if (!config.id) labels.push("Storage ID");
        if (!config.provider) labels.push("存储类型");
        if (!config.endpoint && !(isLocalProvider(config.provider) && normalizeLocalSettings(config.local))) labels.push(isLocalProvider(config.provider) ? "本地根目录" : "Endpoint");
        if (!config.bucket) labels.push("Bucket");
        if (!isLocalProvider(config.provider)) {
          if (!config.accessKeyId) labels.push("Access Key ID");
          if (!config.secretAccessKey) labels.push("Secret Access Key");
        }
        return labels;
      }

      function hasAnyConfig(config) {
        if (!config) return false;
        return [
          config.id,
          config.name,
          config.endpoint,
          config.local,
          config.bucket,
          config.accessKeyId,
          config.secretAccessKey,
          config.sessionToken,
          config.region,
          config.pathPrefix,
          config.publicBaseUrl,
        ].some(Boolean);
      }

      function normalizeSettings(value) {
        var raw = value && typeof value === "object" ? value : {};
        var storages;
        if (Array.isArray(raw.storages)) {
          storages = raw.storages.map(normalizeProfile).filter(function (storage) {
            return storage.id;
          });
        } else if (hasLegacyConfig(raw)) {
          storages = [normalizeProfile(Object.assign({ id: "default", name: "默认存储" }, raw), 0)];
        } else {
          storages = [];
        }

        var used = Object.create(null);
        storages = storages.map(function (storage, index) {
          var baseId = sanitizeStorageId(storage.id || storage.name || storage.provider || storage.bucket || "storage-" + (index + 1));
          if (!baseId) baseId = "storage-" + (index + 1);
          used[baseId] = (used[baseId] || 0) + 1;
          if (used[baseId] > 1) baseId = baseId + "-" + used[baseId];
          storage.id = baseId;
          if (!storage.name) storage.name = storage.bucket || storage.provider || storage.id;
          return storage;
        });

        var activeStorageId = sanitizeStorageId(raw.activeStorageId || "");
        if (!storages.some(function (storage) { return storage.id === activeStorageId; })) {
          var enabled = storages.find(function (storage) { return storage.enabled; });
          activeStorageId = enabled ? enabled.id : ((storages[0] && storages[0].id) || "");
        }
        return {
          activeStorageId: activeStorageId,
          defaultsInitialized: Boolean(raw.defaultsInitialized),
          storages: storages,
        };
      }

      function normalizeProfile(profile) {
        var raw = profile && typeof profile === "object" ? profile : {};
        return {
          accessKeyId: String(raw.accessKeyId || "").trim(),
          bucket: String(raw.bucket || "").trim(),
          enabled: Boolean(raw.enabled),
          endpoint: String(raw.endpoint || "").trim(),
          forcePathStyle: raw.forcePathStyle !== false,
          id: sanitizeStorageId(raw.id || ""),
          local: normalizeLocalSettings(raw.local),
          name: String(raw.name || "").trim(),
          pathPrefix: String(raw.pathPrefix || "").trim(),
          provider: String(raw.provider || "s3").trim() || "s3",
          publicBaseUrl: String(raw.publicBaseUrl || "").trim(),
          region: String(raw.region || "").trim(),
          secretAccessKey: String(raw.secretAccessKey || ""),
          sessionToken: String(raw.sessionToken || "").trim(),
          useSSL: raw.useSSL !== false,
        };
      }

      function hasLegacyConfig(config) {
        return Boolean(config && typeof config === "object" && (
          config.enabled ||
          config.endpoint ||
          config.local ||
          config.bucket ||
          config.accessKeyId ||
          config.secretAccessKey ||
          config.sessionToken ||
          config.region ||
          config.pathPrefix ||
          config.publicBaseUrl
        ));
      }

      function activeStorage(settings) {
        var next = normalizeSettings(settings);
        return next.storages.find(function (storage) {
          return storage.id === next.activeStorageId;
        }) || null;
      }

      function sanitizeStorageId(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9_-]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function providerLabel(provider) {
        var labels = {
          "aliyun-oss": "Aliyun OSS",
          "aws-s3": "AWS S3",
          "custom": "Custom",
          "local": "Local",
          "local-oss": "Local",
          "qiniu-kodo": "Qiniu Kodo",
          "s3": "S3",
          "tencent-cos": "Tencent COS",
        };
        return labels[provider] || provider;
      }

      function isLocalProvider(provider) {
        var value = String(provider || "").trim().toLowerCase();
        return value === "local" || value === "local-oss";
      }

      function normalizeLocalSettings(value) {
        var raw = value && typeof value === "object" ? value : {};
        var root = String(raw.root || "").trim();
        var rootMode = String(raw.rootMode || "").trim().toLowerCase();
        if (!rootMode) {
          if (!root) return null;
          rootMode = root.charAt(0) === "/" || root.indexOf(":\\") === 1 || root.indexOf("~/") === 0 ? "absolute" : "vault";
        }
        if (rootMode === "vault") {
          root = root.replace(/\\/g, "/").replace(/^\/+|\/+$/g, "") || "storage";
          return { root: root, rootMode: "vault" };
        }
        if (rootMode === "absolute" && root) {
          return { root: root, rootMode: "absolute" };
        }
        return null;
      }

      function setMessage(text, tone) {
        message.textContent = text || "";
        message.style.color = tone === "warning" ? "var(--danger)" : tone === "ready" ? "var(--accent-strong)" : "";
      }

      function errorMessage(err) {
        return (err && err.message) || err || "未知错误";
      }

      function escapeHTML(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeAttr(value) {
        return escapeHTML(value).replace(/`/g, "&#96;");
      }
    })();
  </script>
</body>
