<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo IM</title>
    <style>
        :root {
            --page-bg: #f4f6f8;
            --surface: #ffffff;
            --surface-soft: #edf1f3;
            --ink: #20272d;
            --muted: #66717a;
            --quiet: #8a949c;
            --line: #d9e0e4;
            --sidebar: #243538;
            --sidebar-ink: #f4f7f6;
            --sidebar-muted: #a9b9b6;
            --accent: #2f7d62;
            --accent-strong: #276950;
            --amber: #c77a2c;
            --danger: #b54040;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overscroll-behavior: none;
        }

        body {
            background: var(--page-bg);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            letter-spacing: 0;
        }

        button,
        textarea {
            font: inherit;
            letter-spacing: 0;
        }

        #root {
            width: 100vw;
            height: 100vh;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 272px minmax(0, 1fr);
            background: var(--surface);
            overflow: hidden;
        }

        .sidebar {
            min-width: 0;
            height: 100%;
            background: var(--sidebar);
            color: var(--sidebar-ink);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .brand {
            min-height: 92px;
            padding: 22px 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            background: var(--accent);
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .brand h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
        }

        .brand p {
            margin: 4px 0 0;
            color: var(--sidebar-muted);
            font-size: 12px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .side-section {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            margin: 0 0 12px;
            color: var(--sidebar-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .peer-state {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 26px;
            font-weight: 650;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--amber);
            box-shadow: 0 0 0 3px rgba(199, 122, 44, 0.18);
            flex: 0 0 auto;
        }

        .status-dot.online {
            background: #46b37a;
            box-shadow: 0 0 0 3px rgba(70, 179, 122, 0.2);
        }

        .details {
            display: grid;
            grid-template-columns: 74px minmax(0, 1fr);
            gap: 8px 10px;
            margin: 14px 0 0;
            color: var(--sidebar-muted);
            font-size: 12px;
            line-height: 1.35;
        }

        .details dt,
        .details dd {
            margin: 0;
            min-width: 0;
        }

        .details dd {
            color: var(--sidebar-ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .side-footer {
            margin-top: auto;
            padding: 16px 20px;
            color: var(--sidebar-muted);
            font-size: 12px;
            line-height: 1.45;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat {
            min-width: 0;
            height: 100%;
            display: grid;
            grid-template-rows: 72px minmax(0, 1fr) auto;
            background: var(--surface);
        }

        .chat-header {
            min-width: 0;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
        }

        .chat-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.25;
        }

        .chat-header p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }

        .header-badge {
            min-width: 86px;
            height: 32px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            background: var(--surface-soft);
            font-size: 12px;
            font-weight: 650;
            white-space: nowrap;
        }

        .messages {
            min-height: 0;
            overflow-y: auto;
            padding: 22px 24px;
            background:
                linear-gradient(180deg, rgba(237, 241, 243, 0.88), rgba(255, 255, 255, 0.8));
        }

        .empty-state {
            height: 100%;
            min-height: 160px;
            display: grid;
            place-items: center;
            color: var(--quiet);
            font-size: 13px;
        }

        .message-row {
            width: 100%;
            display: flex;
            margin: 0 0 12px;
        }

        .message-row.outgoing {
            justify-content: flex-end;
        }

        .message-row.incoming {
            justify-content: flex-start;
        }

        .bubble {
            max-width: min(520px, 78%);
            border-radius: 8px;
            padding: 10px 12px 8px;
            background: var(--surface);
            border: 1px solid var(--line);
            box-shadow: 0 8px 22px rgba(34, 45, 52, 0.08);
        }

        .outgoing .bubble {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
            font-size: 11px;
            color: var(--muted);
            line-height: 1.2;
        }

        .outgoing .message-meta {
            color: rgba(255, 255, 255, 0.78);
        }

        .sender {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 700;
        }

        .time {
            flex: 0 0 auto;
        }

        .message-text {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            line-height: 1.55;
        }

        .delivery {
            margin-top: 6px;
            font-size: 11px;
            line-height: 1.25;
            color: var(--quiet);
        }

        .outgoing .delivery {
            color: rgba(255, 255, 255, 0.7);
        }

        .delivery.failed {
            color: var(--danger);
        }

        .outgoing .delivery.failed {
            color: #ffd7d7;
        }

        .composer {
            min-width: 0;
            padding: 14px 18px 16px;
            border-top: 1px solid var(--line);
            background: var(--surface);
        }

        .composer-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 92px;
            gap: 10px;
            align-items: end;
        }

        .message-input {
            width: 100%;
            min-height: 46px;
            max-height: 120px;
            padding: 12px 13px;
            resize: none;
            border: 1px solid var(--line);
            border-radius: 8px;
            outline: none;
            color: var(--ink);
            background: #fbfcfc;
            line-height: 1.45;
        }

        .message-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(47, 125, 98, 0.14);
        }

        .send-button {
            height: 46px;
            border: 0;
            border-radius: 8px;
            color: white;
            background: var(--accent);
            font-weight: 700;
            cursor: pointer;
        }

        .send-button:hover {
            background: var(--accent-strong);
        }

        .send-button:disabled {
            cursor: not-allowed;
            opacity: 0.56;
        }

        .compose-state {
            min-height: 18px;
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.3;
        }

        .compose-state.error {
            color: var(--danger);
        }

        @media (max-width: 720px) {
            .app-shell {
                grid-template-columns: 1fr;
                grid-template-rows: auto minmax(0, 1fr);
            }

            .sidebar {
                height: auto;
            }

            .brand {
                min-height: 72px;
                padding: 16px;
            }

            .side-section {
                padding: 12px 16px;
            }

            .side-footer {
                display: none;
            }

            .details {
                grid-template-columns: 72px minmax(0, 1fr);
            }

            .chat {
                min-height: 0;
            }

            .chat-header {
                padding: 14px 16px;
            }

            .header-badge {
                display: none;
            }

            .messages {
                padding: 16px;
            }

            .bubble {
                max-width: 88%;
            }

            .composer {
                padding: 12px;
            }
        }
    </style>
    <script src="public/timeless/0.24.0/timeless.umd.min.js"></script>
    <script src="public/timeless/0.24.0/timeless.dom.umd.min.js"></script>
    <script src="public/timeless/0.24.0/timeless.web.umd.min.js"></script>
    <script>
        Object.assign(window, Timeless);
    </script>
</head>

<body>
    <div id="root">
        <div class="app-shell">
            <aside class="sidebar">
                <div class="brand">
                    <div class="brand-mark">IM</div>
                    <div>
                        <h1>Demo IM</h1>
                        <p id="identity">...</p>
                    </div>
                </div>

                <section class="side-section">
                    <h2 class="section-title">Peer</h2>
                    <div class="peer-state">
                        <span class="status-dot" id="peer-dot"></span>
                        <span id="peer-state">checking</span>
                    </div>
                    <dl class="details">
                        <dt>local</dt>
                        <dd id="local-port">...</dd>
                        <dt>peer</dt>
                        <dd id="peer-port">...</dd>
                        <dt>name</dt>
                        <dd id="peer-name">...</dd>
                    </dl>
                </section>

                <section class="side-section">
                    <h2 class="section-title">Session</h2>
                    <dl class="details">
                        <dt>role</dt>
                        <dd id="role">...</dd>
                        <dt>id</dt>
                        <dd id="instance-id">...</dd>
                    </dl>
                </section>

                <div class="side-footer" id="version">Demo IM</div>
            </aside>

            <main class="chat">
                <header class="chat-header">
                    <div>
                        <h2 id="room-title">Chatroom</h2>
                        <p id="room-subtitle">local bridge ready</p>
                    </div>
                    <div class="header-badge" id="message-count">0 messages</div>
                </header>

                <section class="messages" id="message-list" aria-live="polite">
                    <div class="empty-state">No messages</div>
                </section>

                <form class="composer" id="compose">
                    <div class="composer-row">
                        <textarea class="message-input" id="message-input" rows="1" placeholder="Message"></textarea>
                        <button class="send-button" id="send-button" type="submit">Send</button>
                    </div>
                    <div class="compose-state" id="compose-state"></div>
                </form>
            </main>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
